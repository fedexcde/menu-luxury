<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reconocimiento Facial — Guía de Ciudad</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #c9a84c; --gold-light: #e8d49a; --cream: #f7f3ee;
      --dark: #1c1c1c; --mid: #5a5a5a; --light: #d8d0c4;
    }
    html, body { height: 100%; background: #0a0a0a; font-family: 'Montserrat', sans-serif; overflow: hidden; }

    .page {
      display: grid;
      grid-template-columns: 1fr 320px;
      height: 100vh;
    }

    /* ── CAMERA ZONE ── */
    .camera-zone {
      position: relative;
      background: #080808;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* mirror */
    }

    #overlay {
      position: absolute;
      inset: 0;
      transform: scaleX(-1);
      pointer-events: none;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, rgba(201,168,76,0.8) 50%, var(--gold) 70%, transparent 100%);
      animation: scanMove 3s ease-in-out infinite;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(201,168,76,0.6);
    }

    @keyframes scanMove {
      0%   { top: 5%; opacity: 0; }
      5%   { opacity: 1; }
      50%  { top: 90%; opacity: 1; }
      95%  { opacity: 1; }
      100% { top: 90%; opacity: 0; }
    }

    /* Corner brackets */
    .bracket {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
    }
    .bracket-tl { top: 24px; left: 24px; border-width: 2px 0 0 2px; }
    .bracket-tr { top: 24px; right: 24px; border-width: 2px 2px 0 0; }
    .bracket-bl { bottom: 24px; left: 24px; border-width: 0 0 2px 2px; }
    .bracket-br { bottom: 24px; right: 24px; border-width: 0 2px 2px 0; }

    /* Back button */
    .back-btn {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      color: rgba(255,255,255,0.65);
      font-size: 8.5px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
      text-decoration: none;
      transition: color 0.25s;
      z-index: 20;
    }
    .back-btn:hover { color: var(--gold-light); }
    .back-arrow {
      width: 22px; height: 22px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      transition: border-color 0.25s;
    }
    .back-btn:hover .back-arrow { border-color: var(--gold); }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8,8,8,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 50;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(201,168,76,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 9px; letter-spacing: 4px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    /* Camera label */
    .camera-label {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px; letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      z-index: 10;
    }

    /* ── RIGHT PANEL ── */
    .panel {
      background: #111;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid #222;
    }

    .panel-label {
      font-size: 7.5px; letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase; font-weight: 600;
      margin-bottom: 6px;
    }

    .panel-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 300;
      color: #f0ebe3;
      line-height: 1.1;
    }

    /* Status badge */
    .status-row {
      padding: 14px 22px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid #1e1e1e;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.4s;
    }

    .status-dot.active { background: var(--gold); box-shadow: 0 0 6px rgba(201,168,76,0.5); }
    .status-dot.searching { background: #c9a84c; animation: pulse 1.2s infinite; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .status-text {
      font-size: 8px; letter-spacing: 2.5px;
      color: #666;
      text-transform: uppercase; font-weight: 600;
      transition: color 0.4s;
    }

    .status-text.active { color: var(--gold); }
    .status-text.searching { color: rgba(201,168,76,0.7); }

    /* Results section */
    .results {
      flex: 1;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    /* Face count */
    .face-count {
      text-align: center;
      padding: 16px;
      border: 1px solid #222;
    }

    .face-count-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px; font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }

    .face-count-label {
      font-size: 7.5px; letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Detection cards */
    .detection-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detection-card {
      border: 1px solid #222;
      padding: 16px;
      animation: fadeInUp 0.4s ease;
      transition: border-color 0.3s;
    }

    .detection-card:hover { border-color: #333; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .det-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .det-index {
      font-size: 8px; letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase; font-weight: 600;
    }

    .det-confidence {
      font-size: 8px; letter-spacing: 1px;
      color: #444;
    }

    /* Gender display */
    .det-gender {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }

    .gender-icon {
      font-size: 32px;
      line-height: 1;
    }

    .gender-info { flex: 1; }

    .gender-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 600;
      color: #f0ebe3;
      line-height: 1;
      margin-bottom: 3px;
    }

    .gender-prob {
      font-size: 7.5px; letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
    }

    /* Age bar */
    .age-section { }

    .age-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 7px;
    }

    .age-label {
      font-size: 7.5px; letter-spacing: 3px;
      color: #555;
      text-transform: uppercase; font-weight: 600;
    }

    .age-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600;
      color: var(--gold);
      line-height: 1;
    }

    .age-bar {
      height: 3px;
      background: #1e1e1e;
      position: relative;
      overflow: hidden;
    }

    .age-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      transition: width 0.6s ease;
    }

    .age-range {
      display: flex; justify-content: space-between;
      margin-top: 4px;
    }

    .age-range span {
      font-size: 7px; letter-spacing: 1px;
      color: #3a3a3a;
    }

    /* Expression section */
    .exp-section {
      margin-top: 10px;
      border-top: 1px solid #1c1c1c;
      padding-top: 12px;
    }

    .exp-label {
      font-size: 7.5px; letter-spacing: 3px;
      color: #555;
      text-transform: uppercase; font-weight: 600;
      margin-bottom: 8px;
    }

    .exp-bars { display: flex; flex-direction: column; gap: 5px; }

    .exp-row {
      display: grid;
      grid-template-columns: 80px 1fr 30px;
      align-items: center;
      gap: 8px;
    }

    .exp-name {
      font-size: 7.5px; letter-spacing: 1px;
      color: #555;
      text-transform: capitalize;
    }

    .exp-bar {
      height: 2px;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .exp-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: #333;
      transition: width 0.5s ease;
    }

    .exp-bar-fill.top { background: var(--gold); }

    .exp-pct {
      font-size: 7px; letter-spacing: 0.5px;
      color: #3a3a3a;
      text-align: right;
    }

    /* No face state */
    .no-face {
      text-align: center;
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .no-face-icon {
      font-size: 40px;
      opacity: 0.15;
    }

    .no-face-text {
      font-size: 8px; letter-spacing: 3px;
      color: #333;
      text-transform: uppercase;
      line-height: 1.8;
    }

    /* Bottom footer */
    .panel-footer {
      padding: 14px 22px;
      border-top: 1px solid #1c1c1c;
      display: flex; align-items: center; justify-content: space-between;
    }

    .panel-footer-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 300;
      color: #333; letter-spacing: 3px;
      text-transform: uppercase;
    }

    .panel-footer-note {
      font-size: 7px; letter-spacing: 1.5px;
      color: #2a2a2a;
      text-transform: uppercase;
    }

    /* Face box on canvas - drawn via JS */
  </style>
</head>
<body>
<div class="page">

  <!-- CAMERA ZONE -->
  <div class="camera-zone">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>

    <div class="scan-line"></div>
    <div class="bracket bracket-tl"></div>
    <div class="bracket bracket-tr"></div>
    <div class="bracket bracket-bl"></div>
    <div class="bracket bracket-br"></div>

    <a class="back-btn" href="menu-luxury.html">
      <span class="back-arrow">←</span>
      Volver al menú
    </a>

    <div class="camera-label">● REC EN VIVO · PROCESAMIENTO LOCAL</div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Cargando modelos de IA...</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-label">Análisis Facial</div>
      <div class="panel-title">Reconocimiento<br>en tiempo real</div>
    </div>

    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Iniciando...</div>
    </div>

    <div class="results">
      <div class="face-count">
        <div class="face-count-num" id="faceCountNum">—</div>
        <div class="face-count-label" id="faceCountLabel">Rostros detectados</div>
      </div>

      <div class="detection-list" id="detectionList">
        <div class="no-face">
          <div class="no-face-icon">⬡</div>
          <div class="no-face-text">Posicioná tu rostro<br>frente a la cámara</div>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <div class="panel-footer-brand">Guía de Ciudad</div>
      <div class="panel-footer-note">100% local · Sin envío de datos</div>
    </div>
  </div>

</div>

<script>
const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

const video       = document.getElementById('video');
const canvas      = document.getElementById('overlay');
const loadingOv   = document.getElementById('loadingOverlay');
const loadingTxt  = document.getElementById('loadingText');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const faceCountN  = document.getElementById('faceCountNum');
const faceCountL  = document.getElementById('faceCountLabel');
const detList     = document.getElementById('detectionList');

const EXPRESSIONS_ES = {
  neutral: 'Neutral',
  happy: 'Feliz',
  sad: 'Triste',
  angry: 'Enojado/a',
  fearful: 'Temeroso/a',
  disgusted: 'Disgustado/a',
  surprised: 'Sorprendido/a'
};

const GENDER_ES = {
  male: { label: 'Hombre', icon: '👨' },
  female: { label: 'Mujer', icon: '👩' }
};

function setStatus(type, text) {
  statusDot.className = 'status-dot ' + type;
  statusText.className = 'status-text ' + type;
  statusText.textContent = text;
}

async function init() {
  try {
    loadingTxt.textContent = 'Cargando detección de rostros...';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);

    loadingTxt.textContent = 'Cargando análisis de género y edad...';
    await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);

    loadingTxt.textContent = 'Cargando análisis de expresiones...';
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

    loadingTxt.textContent = 'Activando cámara...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    video.srcObject = stream;

    await new Promise(resolve => video.addEventListener('playing', resolve, { once: true }));

    // Hide loading
    loadingOv.classList.add('hidden');
    setStatus('searching', 'Buscando rostros...');
    faceCountN.textContent = '0';

    // Match canvas to video
    const resizeCanvas = () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.style.width  = '100%';
      canvas.style.height = '100%';
    };
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Detection loop
    detectFaces();
  } catch (err) {
    loadingTxt.textContent = 'Error: ' + (err.message || 'No se pudo acceder a la cámara');
    console.error(err);
  }
}

async function detectFaces() {
  const ctx = canvas.getContext('2d');

  const options = new faceapi.TinyFaceDetectorOptions({
    inputSize: 320,
    scoreThreshold: 0.45
  });

  const loop = async () => {
    if (video.paused || video.ended) {
      requestAnimationFrame(loop);
      return;
    }

    const detections = await faceapi
      .detectAllFaces(video, options)
      .withAgeAndGender()
      .withFaceExpressions();

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const dims = faceapi.matchDimensions(canvas, {
      width: video.videoWidth,
      height: video.videoHeight
    }, true);

    const resized = faceapi.resizeResults(detections, dims);

    // Update status
    if (resized.length === 0) {
      setStatus('searching', 'Buscando rostros...');
      faceCountN.textContent = '0';
      detList.innerHTML = `
        <div class="no-face">
          <div class="no-face-icon">⬡</div>
          <div class="no-face-text">Posicioná tu rostro<br>frente a la cámara</div>
        </div>`;
    } else {
      setStatus('active', 'Rostro detectado');
      faceCountN.textContent = resized.length;

      // Draw boxes on canvas
      resized.forEach((d, i) => {
        const box = d.detection.box;
        const color = '#c9a84c';
        const lw = 1.5;

        ctx.strokeStyle = color;
        ctx.lineWidth = lw;
        ctx.shadowColor = 'rgba(201,168,76,0.5)';
        ctx.shadowBlur = 8;

        // Draw corner brackets instead of full rect
        const s = 20; // bracket size
        const { x, y, width: w, height: h } = box;

        ctx.beginPath();
        // TL
        ctx.moveTo(x + s, y); ctx.lineTo(x, y); ctx.lineTo(x, y + s);
        // TR
        ctx.moveTo(x + w - s, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + s);
        // BL
        ctx.moveTo(x, y + h - s); ctx.lineTo(x, y + h); ctx.lineTo(x + s, y + h);
        // BR
        ctx.moveTo(x + w - s, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - s);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Label above box
        const gender = d.gender;
        const age = Math.round(d.age);
        const gInfo = GENDER_ES[gender] || { label: gender, icon: '👤' };
        const label = `${gInfo.icon} ${gInfo.label}  ·  ${age} años`;

        ctx.font = '600 10px Montserrat, sans-serif';
        ctx.fillStyle = color;
        ctx.letterSpacing = '2px';
        ctx.fillText(label, x, y - 8);
      });

      // Build panel cards
      detList.innerHTML = resized.map((d, i) => {
        const gender = d.gender;
        const age = Math.round(d.age);
        const genderProb = Math.round(d.genderProbability * 100);
        const gInfo = GENDER_ES[gender] || { label: gender, icon: '👤' };

        const ageBarWidth = Math.min(100, (age / 80) * 100);

        // Expressions
        const expEntries = Object.entries(d.expressions)
          .sort(([,a],[,b]) => b - a)
          .slice(0, 4);
        const topExp = expEntries[0][0];

        const expBars = expEntries.map(([exp, val]) => {
          const pct = Math.round(val * 100);
          const isTop = exp === topExp;
          return `
            <div class="exp-row">
              <div class="exp-name">${EXPRESSIONS_ES[exp] || exp}</div>
              <div class="exp-bar">
                <div class="exp-bar-fill ${isTop ? 'top' : ''}" style="width:${pct}%"></div>
              </div>
              <div class="exp-pct">${pct}%</div>
            </div>`;
        }).join('');

        return `
          <div class="detection-card">
            <div class="det-header">
              <div class="det-index">${resized.length > 1 ? 'Persona ' + (i+1) : 'Análisis'}</div>
              <div class="det-confidence">${Math.round(d.detection.score * 100)}% conf.</div>
            </div>

            <div class="det-gender">
              <div class="gender-icon">${gInfo.icon}</div>
              <div class="gender-info">
                <div class="gender-label">${gInfo.label}</div>
                <div class="gender-prob">${genderProb}% probabilidad</div>
              </div>
            </div>

            <div class="age-section">
              <div class="age-header">
                <div class="age-label">Edad estimada</div>
                <div class="age-value">~${age}</div>
              </div>
              <div class="age-bar">
                <div class="age-bar-fill" style="width:${ageBarWidth}%"></div>
              </div>
              <div class="age-range">
                <span>0</span>
                <span>20</span>
                <span>40</span>
                <span>60</span>
                <span>80+</span>
              </div>
            </div>

            <div class="exp-section">
              <div class="exp-label">Expresión facial</div>
              <div class="exp-bars">${expBars}</div>
            </div>
          </div>`;
      }).join('');
    }

    setTimeout(loop, 200);
  };

  loop();
}

init();
</script>
</body>
</html>
